<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог готовых ПК — SYNTH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="header header-raycast">
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="header-inner">
        <a class="navbar-brand logo" href="index.html">SYNTH</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#headerNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="headerNav">
          <div class="navbar-nav">
            <a class="nav-link" href="index.html">Главная</a>
            <a class="nav-link active" href="catalog.html">Каталог</a>
            <a class="nav-link" href="configurator.html">Конфигуратор</a>
            <a class="nav-link" href="faq.html">FAQ</a>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main class="catalog-page py-5">
    <div class="container-1440">
      <h1 class="page-title mb-4">Каталог</h1>
      <p class="text-muted mb-4">Комплектующие и готовые сборки. Используйте поиск и вкладки для быстрого подбора.</p>

      <ul class="nav nav-tabs catalog-tabs mb-4" id="catalogTabs" role="tablist">
        <li class="nav-item"><button class="nav-link active" type="button" data-tab="all">Все</button></li>
        <li class="nav-item"><button class="nav-link" type="button" data-tab="cpu">Процессоры</button></li>
        <li class="nav-item"><button class="nav-link" type="button" data-tab="motherboard">Материнские платы</button></li>
        <li class="nav-item"><button class="nav-link" type="button" data-tab="gpu">Видеокарты</button></li>
        <li class="nav-item"><button class="nav-link" type="button" data-tab="ram">Память</button></li>
        <li class="nav-item"><button class="nav-link" type="button" data-tab="cooling">Охлаждение</button></li>
        <li class="nav-item"><button class="nav-link" type="button" data-tab="storage">Накопители</button></li>
        <li class="nav-item"><button class="nav-link" type="button" data-tab="builds">Готовые ПК</button></li>
      </ul>

      <div class="catalog-toolbar mb-4">
        <div class="row g-3 align-items-center">
          <div class="col-lg-6">
            <div class="search-wrap position-relative">
              <div class="input-group search-group">
                <span class="input-group-text bg-dark border-secondary">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                  </svg>
                </span>
                <input type="search" class="form-control form-control-dark" placeholder="Поиск: GTX, RTX, Intel, Ryzen..." id="searchInput" autocomplete="off">
              </div>
              <div class="search-suggestions d-none" id="searchSuggestions"></div>
            </div>
          </div>
          <div class="col-lg-4">
            <select class="form-select catalog-sort form-select-dark" id="sortSelect">
              <option value="default">По умолчанию</option>
              <option value="price-asc">Сначала дешевле</option>
              <option value="price-desc">Сначала дороже</option>
              <option value="name">По названию</option>
            </select>
          </div>
        </div>
      </div>

      <div class="row">
        <aside class="col-lg-3 mb-4 mb-lg-0">
          <div class="card filter-card">
            <div class="card-body">
              <h5 class="card-title filter-title">Фильтры</h5>

              <div class="accordion accordion-flush filter-accordion" id="filterAccordion">
                <div class="accordion-item">
                  <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#filterCpu">
                      Процессор
                    </button>
                  </h2>
                  <div id="filterCpu" class="accordion-collapse collapse" data-bs-parent="#filterAccordion">
                    <div class="accordion-body p-2">
                      <div class="form-check">
                        <input class="form-check-input filter-cpu" type="radio" name="cpu" id="cpu-all" value="all" checked>
                        <label class="form-check-label" for="cpu-all">Любой</label>
                      </div>
                      <div class="form-check">
                        <input class="form-check-input filter-cpu" type="radio" name="cpu" id="cpu-intel" value="intel">
                        <label class="form-check-label" for="cpu-intel">Intel</label>
                      </div>
                      <div class="form-check">
                        <input class="form-check-input filter-cpu" type="radio" name="cpu" id="cpu-amd" value="amd">
                        <label class="form-check-label" for="cpu-amd">AMD</label>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="accordion-item">
                  <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#filterGpu">
                      Видеокарта
                    </button>
                  </h2>
                  <div id="filterGpu" class="accordion-collapse collapse" data-bs-parent="#filterAccordion">
                    <div class="accordion-body p-2">
                      <div class="form-check">
                        <input class="form-check-input filter-gpu" type="radio" name="gpu" id="gpu-all" value="all" checked>
                        <label class="form-check-label" for="gpu-all">Любая</label>
                      </div>
                      <div class="form-check">
                        <input class="form-check-input filter-gpu" type="radio" name="gpu" id="gpu-nvidia" value="nvidia">
                        <label class="form-check-label" for="gpu-nvidia">NVIDIA</label>
                      </div>
                      <div class="form-check">
                        <input class="form-check-input filter-gpu" type="radio" name="gpu" id="gpu-amd" value="amd">
                        <label class="form-check-label" for="gpu-amd">AMD</label>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="accordion-item">
                  <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#filterRam">
                      ОЗУ
                    </button>
                  </h2>
                  <div id="filterRam" class="accordion-collapse collapse" data-bs-parent="#filterAccordion">
                    <div class="accordion-body p-2">
                      <div class="small text-muted mb-1">Объём</div>
                      <div class="form-check form-check-inline">
                        <input class="form-check-input filter-ram-capacity" type="checkbox" name="ramCap" id="ram-16" value="16">
                        <label class="form-check-label" for="ram-16">16 GB</label>
                      </div>
                      <div class="form-check form-check-inline">
                        <input class="form-check-input filter-ram-capacity" type="checkbox" name="ramCap" id="ram-32" value="32">
                        <label class="form-check-label" for="ram-32">32 GB</label>
                      </div>
                      <div class="form-check form-check-inline">
                        <input class="form-check-input filter-ram-capacity" type="checkbox" name="ramCap" id="ram-64" value="64">
                        <label class="form-check-label" for="ram-64">64 GB</label>
                      </div>
                      <div class="small text-muted mb-1 mt-2">Тип</div>
                      <div class="form-check">
                        <input class="form-check-input filter-ram-type" type="checkbox" name="ramType" id="ram-ddr4" value="DDR4">
                        <label class="form-check-label" for="ram-ddr4">DDR4</label>
                      </div>
                      <div class="form-check">
                        <input class="form-check-input filter-ram-type" type="checkbox" name="ramType" id="ram-ddr5" value="DDR5">
                        <label class="form-check-label" for="ram-ddr5">DDR5</label>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="accordion-item">
                  <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#filterSocket">
                      Сокет
                    </button>
                  </h2>
                  <div id="filterSocket" class="accordion-collapse collapse" data-bs-parent="#filterAccordion">
                    <div class="accordion-body p-2">
                      <div class="form-check">
                        <input class="form-check-input filter-socket" type="checkbox" name="socket" id="sock-lga1700" value="LGA1700">
                        <label class="form-check-label" for="sock-lga1700">LGA1700</label>
                      </div>
                      <div class="form-check">
                        <input class="form-check-input filter-socket" type="checkbox" name="socket" id="sock-am4" value="AM4">
                        <label class="form-check-label" for="sock-am4">AM4</label>
                      </div>
                      <div class="form-check">
                        <input class="form-check-input filter-socket" type="checkbox" name="socket" id="sock-am5" value="AM5">
                        <label class="form-check-label" for="sock-am5">AM5</label>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="accordion-item">
                  <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#filterStorageType">
                      Накопители
                    </button>
                  </h2>
                  <div id="filterStorageType" class="accordion-collapse collapse" data-bs-parent="#filterAccordion">
                    <div class="accordion-body p-2">
                      <div class="form-check">
                        <input class="form-check-input filter-storage-type" type="checkbox" name="storageType" id="st-m2" value="m2">
                        <label class="form-check-label" for="st-m2">M.2 NVMe</label>
                      </div>
                      <div class="form-check">
                        <input class="form-check-input filter-storage-type" type="checkbox" name="storageType" id="st-hdd" value="hdd">
                        <label class="form-check-label" for="st-hdd">HDD</label>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="accordion-item">
                  <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#filterCoolingType">
                      Охлаждение
                    </button>
                  </h2>
                  <div id="filterCoolingType" class="accordion-collapse collapse" data-bs-parent="#filterAccordion">
                    <div class="accordion-body p-2">
                      <div class="form-check">
                        <input class="form-check-input filter-cooling-type" type="checkbox" name="coolingType" id="cool-air" value="air">
                        <label class="form-check-label" for="cool-air">Воздушное</label>
                      </div>
                      <div class="form-check">
                        <input class="form-check-input filter-cooling-type" type="checkbox" name="coolingType" id="cool-water" value="water">
                        <label class="form-check-label" for="cool-water">Водяное</label>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="accordion-item">
                  <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#filterPrice">
                      Цена
                    </button>
                  </h2>
                  <div id="filterPrice" class="accordion-collapse collapse" data-bs-parent="#filterAccordion">
                    <div class="accordion-body p-2">
                      <div class="row g-2">
                        <div class="col-6">
                          <input type="number" class="form-control form-control-dark form-control-sm" placeholder="От" id="priceMin" min="0">
                        </div>
                        <div class="col-6">
                          <input type="number" class="form-control form-control-dark form-control-sm" placeholder="До" id="priceMax" min="0">
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <button class="btn btn-outline-light btn-sm mt-3 w-100" id="resetFilters">Сбросить</button>
            </div>
          </div>
        </aside>

        <div class="col-lg-9">
          <div class="catalog-results mb-3">
            <span class="text-muted" id="resultsCount">Найдено: 10 сборок</span>
          </div>
          <div class="row g-4" id="catalogGrid"></div>
          <div class="text-center py-5 d-none" id="noResults">
            <p class="text-muted">По вашему запросу ничего не найдено</p>
            <button class="btn btn-synth btn-sm" id="clearSearch">Сбросить поиск</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="instockModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content modal-dark">
        <div class="modal-header border-secondary">
          <h5 class="modal-title" id="instockModalTitle">В наличии</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="mb-0" id="instockModalText">В наличии для сборки ПК</p>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer py-4">
    <div class="container-1440 text-center text-muted">
      SYNTH — цифровой бутик премиальных ПК
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/catalog.js"></script>
</body>
</html>
